<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Pro</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; --accent: #007AFF; }
        html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #fff; font-family: var(--font); }
        body { display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; }
        
        /* Поиск */
        #search-box { position: relative; margin-bottom: 10px; z-index: 2000; }
        #search-input { 
            width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #f0f0f0; 
            outline: none; font-size: 16px; background: #f5f5f5; box-sizing: border-box; 
        }

        /* Заголовок и Выбор Валюты */
        #header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        #pair-info { pointer-events: none; }
        #pair-title { font-size: 32px; font-weight: 800; }
        
        /* Переключатель валюты измерения (USDT / RUB) */
        #currency-selector { 
            display: flex; background: #f0f0f0; padding: 3px; border-radius: 10px; height: 32px;
        }
        .curr-btn { 
            border: none; background: none; font-size: 12px; font-weight: 700; 
            padding: 0 12px; border-radius: 8px; cursor: pointer; color: #666;
        }
        .curr-btn.active { background: #fff; color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        /* График */
        #chart-wrapper { 
            flex-grow: 1; width: 100%; border-radius: 16px; 
            overflow: hidden; background: #fff; border: 1px solid #f0f0f0; position: relative;
        }
        #chart-shield { position: absolute; top: 0; right: 0; bottom: 0; width: 45px; z-index: 1000; }
        #tv-chart { width: 100%; height: 100%; }

        /* Кнопки периодов */
        #controls { flex-shrink: 0; padding-top: 15px; z-index: 2000; }
        #periods { 
            display: flex; justify-content: space-between; background: #f0f0f0; padding: 4px; border-radius: 14px; margin-bottom: 10px;
        }
        .period-btn { 
            background: none; border: none; color: #666; padding: 10px 0; border-radius: 11px; font-size: 13px; font-weight: 800; flex: 1;
        }
        .period-btn.active { background: #000; color: #fff; }

        #suggestions { 
            position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; margin-top: 5px; max-height: 200px; overflow-y: auto; z-index: 2001; border: 1px solid #eee;
        }
        .suggest-item { padding: 12px 16px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; cursor: pointer; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск (BTC, ETH, SBER...)" autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <div id="header-row">
        <div id="pair-info">
            <span id="pair-title">BTC</span>
        </div>
        <div id="currency-selector">
            <button class="curr-btn active" data-curr="USDT">USDT</button>
            <button class="curr-btn" data-curr="RUB">RUB</button>
        </div>
    </div>

    <div id="chart-wrapper">
        <div id="tv-chart"></div>
        <div id="chart-shield"></div>
    </div>

    <div id="controls">
        <div id="periods">
            <button class="period-btn" data-range="1D" data-int="5">1Д</button>
            <button class="period-btn" data-range="1W" data-int="60">1Н</button>
            <button class="period-btn active" data-range="1M" data-int="240">1М</button>
            <button class="period-btn" data-range="3M" data-int="D">3М</button>
            <button class="period-btn" data-range="6M" data-int="D">6М</button>
            <button class="period-btn" data-range="12M" data-int="W">1Г</button>
            <button class="period-btn" data-range="ALL" data-int="M">Все</button>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentAsset = "BTC"; // Только имя актива
        let quoteCurrency = "USDT"; // В чем мерим
        let currentRange = "1M";
        let currentInterval = "240";

        // Маппинг тикеров (Актив + Валюта = Тикер TradingView)
        const exchangeMap = {
            "BTC": { "USDT": "BINANCE:BTCUSDT", "RUB": "BINANCE:BTCRUB" },
            "ETH": { "USDT": "BINANCE:ETHUSDT", "RUB": "BINANCE:ETHRUB" },
            "TON": { "USDT": "OKX:TONUSDT", "RUB": "EXMO:TONRUB" },
            "SBER": { "RUB": "MOEX:SBER", "USDT": "BINANCE:BTCUSDT" }, // Заплатка: Сбер только в рублях
            "USD": { "RUB": "MOEX:USDRUB_TOM", "USDT": "BINANCE:USDTBID" },
            "GOLD": { "USDT": "OANDA:XAUUSD", "RUB": "MOEX:GLDRUB_TOM" }
        };

        const assetsList = [
            { id: 'BTC', name: 'Bitcoin' },
            { id: 'ETH', name: 'Ethereum' },
            { id: 'TON', name: 'Toncoin' },
            { id: 'SBER', name: 'Сбербанк' },
            { id: 'USD', name: 'Доллар' },
            { id: 'GOLD', name: 'Золото' }
        ];

        function getFinalSymbol() {
            if (exchangeMap[currentAsset] && exchangeMap[currentAsset][quoteCurrency]) {
                return exchangeMap[currentAsset][quoteCurrency];
            }
            // Если пары не существует (напр. Сбер в USDT), берем то что есть
            return exchangeMap[currentAsset]["RUB"] || exchangeMap[currentAsset]["USDT"];
        }

        function createWidget() {
            const symbol = getFinalSymbol();
            document.getElementById('tv-chart').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": currentInterval,
                "range": currentRange,
                "timezone": "Europe/Moscow",
                "theme": "light",
                "style": "3",
                "locale": "ru",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "container_id": "tv-chart",
                "hide_side_toolbar": true,
                "lock_scale": true,
                "backgroundColor": "#ffffff",
                "gridColor": "#f8f8f8"
            });
        }

        createWidget();

        // Переключение валюты измерения
        document.querySelectorAll('.curr-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.curr-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                quoteCurrency = this.dataset.curr;
                createWidget();
            };
        });

        // Кнопки периодов
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRange = this.dataset.range;
                currentInterval = this.dataset.int;
                createWidget();
            };
        });

        // Поиск
        const input = document.getElementById('search-input');
        const suggs = document.getElementById('suggestions');

        input.oninput = function() {
            const val = this.value.toUpperCase();
            suggs.innerHTML = '';
            if (!val) { suggs.style.display = 'none'; return; }

            assetsList.filter(a => a.id.includes(val) || a.name.toUpperCase().includes(val)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggest-item';
                div.innerHTML = `<b>${item.id}</b> <span style="color:#999;font-size:12px">${item.name}</span>`;
                div.onclick = () => {
                    currentAsset = item.id;
                    document.getElementById('pair-title').textContent = item.id;
                    createWidget();
                    suggs.style.display = 'none';
                    input.value = '';
                    input.blur();
                };
                suggs.appendChild(div);
            });
            suggs.style.display = 'block';
        };
    </script>
</body>
</html>
