<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoGenius Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        :root { --font: 'Inter', sans-serif; --ios-bg: #ffffff; --ios-gray: #f2f2f7; --ios-blue: #007AFF; --ios-secondary: #8e8e93; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--ios-bg); font-family: var(--font); display: flex; flex-direction: column; overflow: hidden; opacity: 0; transition: opacity 0.3s; }
        body.loaded { opacity: 1; } /* Показываем body только после инициализации TG */
        
        #dual-header { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #e5e5ea; gap: 8px; background: #fff; z-index: 10; }
        .selector-box { flex: 1; display: flex; align-items: center; background: var(--ios-gray); padding: 8px 10px; border-radius: 12px; cursor: pointer; }
        .sel-flag { font-size: 20px; margin-right: 8px; width: 24px; text-align: center; }
        .sel-label { flex-grow: 1; overflow: hidden; }
        .sel-code { font-weight: 800; font-size: 14px; display: block; }
        .sel-desc { font-size: 9px; color: var(--ios-secondary); text-transform: uppercase; white-space: nowrap; }
        
        #chart-wrapper { flex-grow: 1; position: relative; background: #fff; z-index: 1; }
        #tv-chart { width: 100%; height: 100%; }
        
        #footer-controls { padding: 12px 12px 24px; border-top: 0.5px solid #e5e5ea; background: #fff; z-index: 10; }
        #periods { display: flex; background: var(--ios-gray); padding: 2px; border-radius: 10px; gap: 2px; }
        .period-btn { flex: 1; border: none; background: none; padding: 10px 0; font-size: 11px; font-weight: 700; border-radius: 8px; color: var(--ios-secondary); cursor: pointer; }
        .period-btn.active { background: #000; color: #fff; }

        /* Модалка (как в оригинале) */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; transform: translateY(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        #modal-overlay.open { transform: translateY(0); }
        #modal-header { padding: 16px; border-bottom: 0.5px solid #e5e5ea; display: flex; justify-content: space-between; align-items: center; }
        #modal-search { padding: 12px 16px; }
        #search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--ios-gray); font-size: 16px; outline: none; }
        #tabs { display: flex; padding: 0 16px 12px; gap: 8px; overflow-x: auto; }
        .tab { padding: 8px 14px; background: var(--ios-gray); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--ios-secondary); cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--ios-blue); color: #fff; }
        #assets-list { overflow-y: auto; flex-grow: 1; padding-bottom: 40px; }
        .asset-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #f2f2f7; cursor: pointer; }
    </style>
</head>
<body>

    <div id="dual-header">
        <div class="selector-box" onclick="openModal('base')">
            <span class="sel-flag" id="base-flag">🇺🇦</span>
            <div class="sel-label"><span class="sel-code" id="base-code">UAH</span><span class="sel-desc">Объект</span></div>
        </div>
        <div style="color:var(--ios-secondary);">/</div>
        <div class="selector-box" onclick="openModal('quote')">
            <span class="sel-flag" id="quote-flag">🇺🇸</span>
            <div class="sel-label"><span class="sel-code" id="quote-code">USD</span><span class="sel-desc">Валюта</span></div>
        </div>
    </div>

    <div id="chart-wrapper"><div id="tv-chart"></div></div>

    <div id="footer-controls">
        <div id="periods">
            <button class="period-btn active" onclick="setRange('1D', '5', event)">1Д</button>
            <button class="period-btn" onclick="setRange('1M', 'D', event)">1М</button>
            <button class="period-btn" onclick="setRange('3M', 'D', event)">3М</button>
            <button class="period-btn" onclick="setRange('12M', 'W', event)">1Г</button>
            <button class="period-btn" onclick="setRange('ALL', 'M', event)">Все</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-header">
            <b style="font-size:17px;">Выбор актива</b>
            <div style="color:var(--ios-blue); font-weight:600; cursor:pointer;" onclick="closeModal()">Готово</div>
        </div>
        <div id="modal-search"><input type="text" id="search-input" placeholder="Поиск..."></div>
        <div id="tabs">
            <div class="tab active" data-type="cis">СНГ</div>
            <div class="tab" data-type="world">Мировые</div>
            <div class="tab" data-type="crypto">Крипто</div>
        </div>
        <div id="assets-list"></div>
    </div>

    <script>
        // --- БЛОК 1: Мгновенная инициализация TG ---
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        document.body.classList.add('loaded'); // Показываем интерфейс
        if(tg.themeParams.bg_color) document.body.style.backgroundColor = tg.themeParams.bg_color;

        // --- БЛОК 2: Данные и Состояние ---
        let base = { id: 'UAH', f: '🇺🇦', type: 'cis' };
        let quote = { id: 'USD', f: '🇺🇸', type: 'world' };
        let curRange = '1D', curInt = '5', selMode = 'base', activeTab = 'cis';

        const assets = [
            { id: 'UAH', f: '🇺🇦', n: 'Гривна', type: 'cis' },
            { id: 'RUB', f: '🇷🇺', n: 'Рубль', type: 'cis' },
            { id: 'KZT', f: '🇰🇿', n: 'Тенге', type: 'cis' },
            { id: 'BYN', f: '🇧🇾', n: 'Бел. рубль', type: 'cis' },
            { id: 'USD', f: '🇺🇸', n: 'Доллар США', type: 'world' },
            { id: 'EUR', f: '🇪🇺', n: 'Евро', type: 'world' },
            { id: 'GBP', f: '🇬🇧', n: 'Фунт', type: 'world' },
            { id: 'BTC', f: '₿', n: 'Bitcoin', type: 'crypto' },
            { id: 'ETH', f: '💎', n: 'Ethereum', type: 'crypto' },
            { id: 'TON', f: '💎', n: 'Toncoin', type: 'crypto' }
        ];

        // --- БЛОК 3: Логика Графика (ИСПРАВЛЕННАЯ) ---
        let tvWidget = null;

        function createWidget() {
            // Если виджет уже есть, просто меняем символ (это быстрее и безопаснее на телефоне)
            let sym = base.type === 'crypto' 
                ? `BINANCE:${base.id}${quote.id === 'USD' ? 'USDT' : quote.id}`
                : `1/(FX_IDC:USD${base.id}/FX_IDC:USD${quote.id})`;

            const widgetOptions = {
                "autosize": true, "symbol": sym, "interval": curInt,
                "timezone": "Etc/UTC", "theme": "light", "style": "3", "locale": "ru",
                "container_id": "tv-chart", "hide_top_toolbar": true, "hide_legend": true, 
                "range": curRange, "save_image": false
            };

            try {
                // Всегда создаем новый виджет, очищая старый контейнер
                document.getElementById('tv-chart').innerHTML = '';
                tvWidget = new TradingView.widget(widgetOptions);
            } catch (e) { console.error("Widget Error:", e); }
        }

        // --- БЛОК 4: Интерфейс и Модалка ---
        function openModal(m) {
            selMode = m;
            document.getElementById('modal-overlay').classList.add('open');
            renderList();
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

        function renderList(search = "") {
            const list = document.getElementById('assets-list');
            list.innerHTML = '';
            const filtered = assets.filter(a => 
                a.type === activeTab && 
                (a.id.toUpperCase().includes(search.toUpperCase()) || a.n.toUpperCase().includes(search.toUpperCase()))
            );
            filtered.forEach(a => {
                const div = document.createElement('div');
                div.className = 'asset-item';
                div.innerHTML = `<span class="sel-flag">${a.f}</span><div><b>${a.id}</b> <span style="color:#888;font-size:12px;margin-left:5px;">${a.n}</span></div>`;
                div.onclick = () => {
                    if(selMode === 'base') {
                        base = a;
                        document.getElementById('base-flag').innerText = a.f;
                        document.getElementById('base-code').innerText = a.id;
                    } else {
                        quote = a;
                        document.getElementById('quote-flag').innerText = a.f;
                        document.getElementById('quote-code').innerText = a.id;
                    }
                    closeModal();
                    createWidget(); // Перерисовываем график
                };
                list.appendChild(div);
            });
        }

        // Поиск и Табы
        document.getElementById('search-input').addEventListener('input', (e) => renderList(e.target.value));
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                activeTab = t.dataset.type;
                renderList(document.getElementById('search-input').value);
            };
        });

        function setRange(r, i, e) {
            curRange = r; curInt = i;
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            createWidget();
        }

        // --- БЛОК 5: Запуск (БЕЗОПАСНЫЙ) ---
        // Ждем полной загрузки страницы и даем TG продышаться, только потом грузим график
        window.addEventListener('load', () => {
            setTimeout(createWidget, 500); 
        });
    </script>
</body>
</html>
