<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Pro</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; }
        body { margin: 0; padding: 20px; background: #fff; color: #000; font-family: var(--font); -webkit-font-smoothing: antialiased; }
        #search-box { position: relative; margin-bottom: 20px; }
        #search-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #efefef; outline: none; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; max-height: 200px; overflow-y: auto; display: none; border: 1px solid #eee; margin-top: 8px; }
        .suggest-item { padding: 12px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; cursor: pointer; }
        .suggest-name { font-weight: 600; }
        #pair-display { font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        #current-price { font-size: 38px; font-weight: 900; display: block; margin: 10px 0; }
        #price-change { font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-bottom: 20px; }
        #chart-container { width: 100%; height: 240px; margin-bottom: 20px; }
        #periods { display: flex; justify-content: space-between; background: #f0f0f0; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .period-btn { background: none; border: none; color: #666; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 800; flex: 1; cursor: pointer; }
        .period-btn.active { background: #000; color: #fff; }
        #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #f9f9f9; padding: 12px; border-radius: 14px; border: 1px solid #f0f0f0; }
        .stat-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 14px; font-weight: 700; }
    </style>
</head>
<body>
    <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск (BTC, SBER, USD)...">
        <div id="suggestions"></div>
    </div>
    <div id="pair-display"><span id="base-asset">BTC</span> / <span id="quote-asset" style="color: #888;">USDT</span></div>
    <span id="current-price">Загрузка...</span>
    <span id="price-change">0.00%</span>
    <div id="chart-container"><canvas id="mainChart"></canvas></div>
    <div id="periods">
        <button class="period-btn active" data-days="1" data-binance="1h" data-moex="60">1D</button>
        <button class="period-btn" data-days="7" data-binance="4h" data-moex="24">1W</button>
        <button class="period-btn" data-days="30" data-binance="1d" data-moex="24">1M</button>
        <button class="period-btn" data-days="90" data-binance="1d" data-moex="24">3M</button>
        <button class="period-btn" data-days="365" data-binance="1w" data-moex="24">1Y</button>
    </div>
    <div id="stats">
        <div class="stat-card"><div class="stat-label">Источник</div><div class="stat-value" id="data-source">Binance</div></div>
        <div class="stat-card"><div class="stat-label">Биржа</div><div class="stat-value" id="market-name">Crypto Market</div></div>
    </div>

<script>
    const assets = [
        { id: 'BTC', name: 'Bitcoin', type: 'crypto', country: '' },
        { id: 'ETH', name: 'Ethereum', type: 'crypto', country: '' },
        { id: 'SBER', name: 'Сбербанк', type: 'moex', country: 'Россия' },
        { id: 'USD', name: 'Доллар', type: 'moex', country: 'США' },
        { id: 'TON', name: 'Toncoin', type: 'crypto', country: '' }
    ];

    let base = 'BTC', quote = 'USDT', mode = 'crypto', myChart = null;
    let bInterval = '1h', mInterval = '60';

    // Обработка кликов по периодам
    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            bInterval = this.dataset.binance;
            mInterval = this.dataset.moex;
            fetchData();
        });
    });

    async function fetchData() {
        document.getElementById('current-price').textContent = "Загрузка...";
        try {
            if (mode === 'crypto') await fetchBinance();
            else await fetchMOEX();
        } catch (e) {
            document.getElementById('current-price').textContent = "Ошибка API";
        }
    }

    async function fetchBinance() {
        const symbol = base + quote;
        const [tRes, cRes] = await Promise.all([
            fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`),
            fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${bInterval}&limit=50`)
        ]);
        const ticker = await tRes.json();
        const klines = await cRes.json();
        const points = klines.map(k => ({ t: k[0], y: parseFloat(k[4]) }));
        
        updateUI(ticker.lastPrice, ticker.priceChangePercent, points);
    }

    async function fetchMOEX() {
        const isCur = (base === 'USD');
        const ticker = isCur ? 'USDRUB_TOM' : base;
        const engine = isCur ? 'currency' : 'stock';
        const market = isCur ? 'selt' : 'shares';
        
        const [tRes, cRes] = await Promise.all([
            fetch(`https://iss.moex.com/iss/engines/${engine}/markets/${market}/securities/${ticker}.json?iss.meta=off`),
            fetch(`https://iss.moex.com/iss/engines/${engine}/markets/${market}/securities/${ticker}/candles.json?interval=${mInterval}`)
        ]);
        
        const tData = await tRes.json();
        const cData = await cRes.json();
        
        const price = tData.marketdata.data[0][12] || tData.marketdata.data[0][2] || cData.candles.data[cData.candles.data.length - 1][1];
        const lastClose = tData.securities.data[0][3];
        const change = ((price - lastClose) / lastClose * 100);
        const points = cData.candles.data.map(c => ({ t: new Date(c[6]).getTime(), y: c[1] }));
        
        updateUI(price, change, points);
    }

    function updateUI(price, change, points) {
        const p = parseFloat(price);
        document.getElementById('current-price').textContent = isNaN(p) ? price : p.toLocaleString();
        const el = document.getElementById('price-change');
        const c = parseFloat(change);
        el.textContent = (c >= 0 ? '+' : '') + c.toFixed(2) + '%';
        el.style.color = c >= 0 ? '#2E7D32' : '#C62828';
        el.style.background = c >= 0 ? '#E8F5E9' : '#FFEBEE';
        renderChart(points);
    }

    function renderChart(points) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: points.map(p => p.t),
                datasets: [{
                    data: points.map(p => p.y),
                    borderColor: '#000',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.1,
                    fill: false
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { position: 'right' } } }
        });
    }

    // Поиск
    const input = document.getElementById('search-input');
    const suggs = document.getElementById('suggestions');
    input.addEventListener('input', (e) => {
        const v = e.target.value.toLowerCase();
        suggs.innerHTML = '';
        if (!v) { suggs.style.display = 'none'; return; }
        const found = assets.filter(a => a.id.toLowerCase().includes(v) || a.country.toLowerCase().includes(v));
        found.forEach(item => {
            const d = document.createElement('div');
            d.className = 'suggest-item';
            d.innerHTML = `<span class="suggest-name">${item.id}</span><span style="font-size:12px;color:#888">${item.name}</span>`;
            d.onclick = () => {
                base = item.id; mode = item.type;
                quote = (mode === 'crypto' ? 'USDT' : 'RUB');
                document.getElementById('base-asset').textContent = base;
                document.getElementById('quote-asset').textContent = quote;
                document.getElementById('data-source').textContent = (mode === 'crypto' ? 'Binance' : 'MOEX');
                document.getElementById('market-name').textContent = (mode === 'crypto' ? 'Crypto Market' : 'Moscow Exchange');
                suggs.style.display = 'none'; input.value = '';
                fetchData();
            };
            suggs.appendChild(d);
        });
        suggs.style.display = found.length ? 'block' : 'none';
    });

    window.onload = fetchData;
</script>
</body>
</html>
