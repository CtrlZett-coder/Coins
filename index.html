<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Debug Mode</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; display: flex; flex-direction: column; height: 100vh; }
        #debug-log { position: fixed; top: 0; left: 0; width: 100%; background: rgba(255,0,0,0.1); color: red; font-size: 10px; z-index: 10000; pointer-events: none; }
        #header { padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #eee; }
        .btn { flex: 1; padding: 10px; background: #f0f0f0; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; }
        #chart-container { flex-grow: 1; background: #fafafa; }
    </style>
</head>
<body>

    <div id="debug-log"></div>
    
    <div id="header">
        <div class="btn" onclick="openM()">Выбрать: <span id="cur-val">UAH</span></div>
    </div>

    <div id="chart-container" id="tv_chart_box">
        <div id="tv-chart" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // Функция для вывода ошибок на экран телефона
        window.onerror = function(m, u, l) {
            document.getElementById('debug-log').innerHTML += `ERR: ${m} Line: ${l}<br>`;
        };

        const tg = window.Telegram.WebApp;
        
        try {
            tg.ready();
            tg.expand();
            document.getElementById('debug-log').innerHTML += "TG Ready OK<br>";
        } catch(e) {
            document.getElementById('debug-log').innerHTML += "TG Init Error<br>";
        }

        function loadChart(symbol = "FX_IDC:USDUAH") {
            try {
                document.getElementById('tv-chart').innerHTML = '';
                new TradingView.widget({
                    "autosize": true,
                    "symbol": symbol,
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "light",
                    "style": "1",
                    "locale": "ru",
                    "toolbar_bg": "#f1f3f6",
                    "enable_publishing": false,
                    "hide_top_toolbar": true,
                    "container_id": "tv-chart"
                });
                document.getElementById('debug-log').innerHTML += "Widget Load Attempt...<br>";
            } catch(e) {
                document.getElementById('debug-log').innerHTML += "Widget Error: " + e + "<br>";
            }
        }

        function openM() {
            const sym = prompt("Введите код валюты (например, RUB или EUR):", "RUB");
            if(sym) {
                document.getElementById('cur-val').innerText = sym;
                loadChart("FX_IDC:USD" + sym.toUpperCase());
            }
        }

        // Запуск через 1 секунду после загрузки
        setTimeout(() => {
            loadChart();
        }, 1000);
    </script>
</body>
</html>
