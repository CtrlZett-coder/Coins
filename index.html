<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --font-family: 'Inter', sans-serif;
            --bg-color: #ffffff;
        }
        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-color);
            color: #000; font-family: var(--font-family);
            display: flex; flex-direction: column;
        }
        #search-input {
            width: 100%; padding: 12px; border-radius: 12px;
            border: 1px solid #e0e0e0; font-size: 16px;
            margin-bottom: 20px; outline: none; box-sizing: border-box;
        }
        #header { display: flex; align-items: center; margin-bottom: 10px; }
        #coin-icon { width: 32px; height: 32px; margin-right: 10px; border-radius: 50%; }
        #coin-name { font-size: 22px; font-weight: 700; }
        #price-container { margin-bottom: 20px; }
        #current-price { font-size: 32px; font-weight: 800; }
        #price-change { font-size: 14px; font-weight: 600; }
        #chart-container { width: 100%; height: 250px; margin-bottom: 20px; }
        #periods {
            display: flex; justify-content: space-between;
            background: #f5f5f5; padding: 4px; border-radius: 12px; margin-bottom: 20px;
        }
        .period-btn {
            background: none; border: none; color: #888;
            padding: 8px 12px; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .period-btn.active { background: #000; color: #fff; }
        #stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            background: #f9f9f9; padding: 15px; border-radius: 16px; border: 1px solid #eee;
        }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .stat-value { font-size: 16px; font-weight: 600; }
    </style>
</head>
<body>

    <input type="text" id="search-input" placeholder="Поиск (например, bitcoin)..." list="coins-list">
    <datalist id="coins-list"></datalist>

    <div id="header">
        <img id="coin-icon" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <span id="coin-name">Загрузка...</span>
    </div>
    
    <div id="price-container">
        <div id="current-price">$0.00</div>
        <div id="price-change">0.00%</div>
    </div>

    <div id="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="periods">
        <button class="period-btn active" data-days="1">1D</button>
        <button class="period-btn" data-days="7">1W</button>
        <button class="period-btn" data-days="90">3M</button>
        <button class="period-btn" data-days="180">6M</button>
        <button class="period-btn" data-days="365">1Y</button>
        <button class="period-btn" data-days="max">ALL</button>
    </div>

    <div id="stats">
        <div class="stat-item">
            <div class="stat-label">Пик за период</div>
            <div class="stat-value" id="peak-price">$0.00</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">Дата пика</div>
            <div class="stat-value" id="peak-date">---</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let currentCoin = 'bitcoin';
        let currentDays = '1';
        let myChart = null;

        const ctx = document.getElementById('mainChart').getContext('2d');

        async function fetchTopCoins() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=150&page=1');
                const coins = await res.json();
                const list = document.getElementById('coins-list');
                coins.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.name;
                    list.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        async function loadCoinData() {
            try {
                const infoRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}?localization=false&market_data=true`);
                const coin = await infoRes.json();
                
                document.getElementById('coin-icon').src = coin.image.small;
                document.getElementById('coin-name').textContent = coin.name;
                document.getElementById('current-price').textContent = `$${coin.market_data.current_price.usd.toLocaleString()}`;
                
                const change = coin.market_data.price_change_percentage_24h;
                const changeEl = document.getElementById('price-change');
                changeEl.textContent = `${change.toFixed(2)}%`;
                changeEl.style.color = change >= 0 ? '#4caf50' : '#f44336';

                const chartRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}/market_chart?vs_currency=usd&days=${currentDays}`);
                const chartData = await chartRes.json();
                updateChart(chartData.prices);
            } catch (e) { console.error(e); }
        }

        function updateChart(prices) {
            const labels = prices.map(p => new Date(p[0]));
            const data = prices.map(p => p[1]);

            let maxP = Math.max(...data);
            let maxIdx = data.indexOf(maxP);
            document.getElementById('peak-price').textContent = `$${maxP.toLocaleString()}`;
            document.getElementById('peak-date').textContent = labels[maxIdx].toLocaleDateString();

            if (myChart) myChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, 'rgba(0,0,0,0.05)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        borderColor: '#000',
                        borderWidth: 2,
                        fill: true,
                        backgroundColor: gradient,
                        pointRadius: 0,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { position: 'right', grid: { display: false }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        document.getElementById('search-input').addEventListener('change', (e) => {
            currentCoin = e.target.value;
            loadCoinData();
            e.target.value = '';
        });

        document.getElementById('periods').addEventListener('click', (e) => {
            if (e.target.classList.contains('period-btn')) {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDays = e.target.dataset.days;
                loadCoinData();
            }
        });

        window.onload = () => { fetchTopCoins(); loadCoinData(); };
    </script>
</body>
</html>
