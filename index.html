<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Pro</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; --accent: #007AFF; }
        body { margin: 0; padding: 20px; background: #fff; color: #000; font-family: var(--font); -webkit-font-smoothing: antialiased; }
        #search-box { position: relative; margin-bottom: 20px; }
        #search-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #efefef; outline: none; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; max-height: 200px; overflow-y: auto; display: none; border: 1px solid #eee; margin-top: 8px; animation: fadeIn 0.2s ease-out; }
        .suggest-item { padding: 12px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; cursor: pointer; }
        .suggest-name { font-weight: 600; }
        .suggest-desc { font-size: 12px; color: #888; }
        #pair-display { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .asset-btn { font-size: 24px; font-weight: 800; border-bottom: 2px dashed #ccc; }
        #current-price { font-size: 38px; font-weight: 900; letter-spacing: -1.5px; display: block; margin: 10px 0; }
        #price-change { font-size: 14px; font-weight: 700; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-bottom: 20px; }
        #chart-container { width: 100%; height: 240px; margin-bottom: 20px; }
        #periods { display: flex; justify-content: space-between; background: #f0f0f0; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
        .period-btn { background: none; border: none; color: #666; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 800; flex: 1; cursor: pointer; }
        .period-btn.active { background: #000; color: #fff; }
        #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #f9f9f9; padding: 12px; border-radius: 14px; border: 1px solid #f0f0f0; }
        .stat-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 15px; font-weight: 700; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск (BTC, SBER, USD)...">
        <div id="suggestions"></div>
    </div>
    <div id="pair-display"><span class="asset-btn" id="base-asset">BTC</span><span>/</span><span id="quote-asset">USDT</span></div>
    <span id="current-price">Загрузка...</span>
    <span id="price-change">0.00%</span>
    <div id="chart-container"><canvas id="mainChart"></canvas></div>
    <div id="periods">
        <button class="period-btn active" data-days="1">1D</button>
        <button class="period-btn" data-days="7">1W</button>
        <button class="period-btn" data-days="30">1M</button>
        <button class="period-btn" data-days="90">3M</button>
        <button class="period-btn" data-days="365">1Y</button>
    </div>
    <div id="stats">
        <div class="stat-card"><div class="stat-label">Источник</div><div class="stat-value" id="data-source">Binance API</div></div>
        <div class="stat-card"><div class="stat-label">Биржа</div><div class="stat-value" id="market-name">Crypto</div></div>
    </div>

<script>
    const assets = [
        { id: 'BTC', name: 'Bitcoin', type: 'crypto', desc: '🪙 Крипто', country: '' },
        { id: 'ETH', name: 'Ethereum', type: 'crypto', desc: '💎 Крипто', country: '' },
        { id: 'SBER', name: 'Сбербанк', type: 'moex', desc: '🏦 Акция РФ', country: 'Россия Russia' },
        { id: 'USD', name: 'Доллар', type: 'moex', desc: '🇺🇸 USD/RUB', country: 'США USA' },
        { id: 'TON', name: 'Toncoin', type: 'crypto', desc: '💎 TON', country: '' }
    ];

    let base = 'BTC', quote = 'USDT', mode = 'crypto', currentDays = 1, myChart = null;

    // Инициализация кнопок
    document.querySelectorAll('.period-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentDays = parseInt(this.getAttribute('data-days'));
            fetchData();
        });
    });

    async function fetchData() {
        try {
            if (mode === 'crypto') await fetchBinance();
            else await fetchMOEX();
        } catch (e) {
            document.getElementById('current-price').textContent = "Ошибка сети";
            console.error(e);
        }
    }

    async function fetchBinance() {
        const symbol = base + quote;
        const interval = currentDays <= 1 ? '1h' : '1d';
        const [tickerRes, chartRes] = await Promise.all([
            fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`),
            fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=50`)
        ]);
        const ticker = await tickerRes.json();
        const klines = await chartRes.json();
        
        renderPrice(ticker.lastPrice, ticker.priceChangePercent);
        renderChart(klines.map(k => ({ t: k[0], y: parseFloat(k[4]) })));
    }

    async function fetchMOEX() {
        const isCurrency = base === 'USD';
        const ticker = isCurrency ? 'USDRUB_TOM' : base;
        const engine = isCurrency ? 'currency' : 'stock';
        const market = isCurrency ? 'selt' : 'shares';
        
        const res = await fetch(`https://iss.moex.com/iss/engines/${engine}/markets/${market}/securities/${ticker}.json?iss.meta=off`);
        const data = await res.json();
        
        const price = data.marketdata.data[0][12] || data.marketdata.data[0][2];
        const lastClose = data.securities.data[0][3];
        const change = ((price - lastClose) / lastClose * 100);
        
        renderPrice(price, change);

        const candleRes = await fetch(`https://iss.moex.com/iss/engines/${engine}/markets/${market}/securities/${ticker}/candles.json?interval=${currentDays <= 1 ? 60 : 24}`);
        const candleData = await candleRes.json();
        renderChart(candleData.candles.data.map(c => ({ t: new Date(c[6]).getTime(), y: c[1] })));
    }

    function renderPrice(price, change) {
        document.getElementById('current-price').textContent = parseFloat(price).toLocaleString();
        const el = document.getElementById('price-change');
        el.textContent = (change >= 0 ? '+' : '') + parseFloat(change).toFixed(2) + '%';
        el.style.color = change >= 0 ? '#2E7D32' : '#C62828';
        el.style.background = change >= 0 ? '#E8F5E9' : '#FFEBEE';
    }

    function renderChart(dataPoints) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: dataPoints.map(d => d.t),
                datasets: [{
                    data: dataPoints.map(d => d.y),
                    borderColor: '#000',
                    borderWidth: 2,
                    pointRadius: 0,
                    tension: 0.2,
                    fill: false
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { x: { display: false }, y: { position: 'right' } } }
        });
    }

    // Поиск
    const searchInput = document.getElementById('search-input');
    const suggestions = document.getElementById('suggestions');

    searchInput.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        suggestions.innerHTML = '';
        if (!val) { suggestions.style.display = 'none'; return; }
        
        const filtered = assets.filter(a => a.id.toLowerCase().includes(val) || a.country.toLowerCase().includes(val));
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span><b>${item.id}</b> <small>${item.name}</small></span><span class="suggest-desc">${item.desc}</span>`;
            div.onclick = () => {
                base = item.id;
                mode = item.type;
                quote = mode === 'crypto' ? 'USDT' : 'RUB';
                document.getElementById('base-asset').textContent = base;
                document.getElementById('quote-asset').textContent = quote;
                document.getElementById('data-source').textContent = mode === 'moex' ? 'MOEX API' : 'Binance API';
                suggestions.style.display = 'none';
                searchInput.value = '';
                fetchData();
            };
            suggestions.appendChild(div);
        });
        suggestions.style.display = filtered.length ? 'block' : 'none';
    });

    window.onload = fetchData;
</script>
</body>
</html>
