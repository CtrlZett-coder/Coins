<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse - Твой Финансовый Трекер</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #e0e0e0;
            --active-color: #000000;
            --active-text: #ffffff;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Поиск */
        #search-container {
            margin-bottom: 20px;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--accent-color);
            font-size: 16px;
            font-family: var(--font-family);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        #search-input:focus {
            border-color: #000000;
        }

        /* Хедер с ценой */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 5px;
        }

        #coin-info {
            display: flex;
            align-items: center;
        }

        #coin-icon {
            width: 32px;
            height: 32px;
            margin-right: 10px;
        }

        #coin-name {
            font-size: 24px;
            font-weight: 700;
        }

        #price-container {
            text-align: right;
        }

        #current-price {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        #price-change {
            font-size: 14px;
            font-weight: 500;
        }

        /* График */
        #chart-container {
            width: 100%;
            height: 250px;
            margin-bottom: 20px;
            position: relative;
        }

        /* Переключатели периодов */
        #periods {
            display: flex;
            justify-content: space-between;
            background-color: #f5f5f5;
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 20px;
        }

        .period-btn {
            background: none;
            border: none;
            color: #888888;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .period-btn.active {
            background-color: var(--active-color);
            color: var(--active-text);
        }

        /* Статистика (Пик и т.д.) */
        #stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--accent-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Поиск валюты (например, bitcoin)..." list="coins-list">
        <datalist id="coins-list"></datalist>
    </div>

    <div id="header">
        <div id="coin-info">
            <img id="coin-icon" src="" alt="">
            <span id="coin-name">---</span>
        </div>
    </div>
    
    <div id="price-container">
        <div id="current-price">$0.00</div>
        <div id="price-change">0.00%</div>
    </div>

    <div id="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="periods">
        <button class="period-btn active" data-days="1">1D</button>
        <button class="period-btn" data-days="7">1W</button>
        <button class="period-btn" data-days="90">3M</button>
        <button class="period-btn" data-days="180">6M</button>
        <button class="period-btn" data-days="365">1Y</button>
        <button class="period-btn" data-days="max">ALL</button>
    </div>

    <div id="stats">
        <div class="stat-item">
            <span class="stat-label">Пик за период</span>
            <span class="stat-value" id="peak-price">$0.00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Дата пика</span>
            <span class="stat-value" id="peak-date">---</span>
        </div>
    </div>

    <script>

        tg.expand();

        // Переменные
        let currentCoin = 'bitcoin';
        let currentDays = '1';
        let myChart = null;

        // Элементы
        const searchInput = document.getElementById('search-input');
        const coinsList = document.getElementById('coins-list');
        const coinIcon = document.getElementById('coin-icon');
        const coinNameDisplay = document.getElementById('coin-name');
        const currentPriceDisplay = document.getElementById('current-price');
        const priceChangeDisplay = document.getElementById('price-change');
        const peakPriceDisplay = document.getElementById('peak-price');
        const peakDateDisplay = document.getElementById('peak-date');
        const ctx = document.getElementById('mainChart').getContext('2d');

        // Инициализация
        init();

        async function init() {
            await fetchTopCoins(); // Получаем ТОП-100 для поиска
            await loadCoinData();
        }

        // 1. ПОИСК: Получаем ТОП-100 монет с CoinGecko
        async function fetchTopCoins() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=100&page=1&sparkline=false');
                const coins = await response.json();
                coinsList.innerHTML = '';
                coins.forEach(coin => {
                    const option = document.createElement('option');
                    option.value = coin.id; // Для запроса API
                    option.textContent = `${coin.name} (${coin.symbol.toUpperCase()})`; // Для отображения
                    coinsList.appendChild(option);
                });
            } catch (error) {
                console.error('Ошибка получения списка монет:', error);
            }
        }

        // Обработка выбора в поиске
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value;
            const options = document.getElementById('coins-list').options;
            for (let i = 0; i < options.length; i++) {
                if (options[i].value === val) {
                    currentCoin = val;
                    loadCoinData();
                    searchInput.value = ''; // Очистить поиск
                    searchInput.blur(); // Убрать фокус
                    break;
                }
            }
        });

        // 2. ЗАГРУЗКА ДАННЫХ МОНЕТЫ (Цена и График)
        async function loadCoinData() {
            try {
                // Запрос текущей цены и инфы (используем Simple Price, но запрашиваем ID для имени)
                const infoRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false`);
                const coin = await infoRes.json();
                updateHeader(coin);

                // Запрос исторических данных
                const chartRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}/market_chart?vs_currency=usd&days=${currentDays}`);
                const chartData = await chartRes.json();
                updateChart(chartData.prices);
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
                coinNameDisplay.textContent = 'Ошибка';
            }
        }

        // Обновление хедера с ценой
        function updateHeader(coin) {
            coinIcon.src = coin.image.small;
            coinNameDisplay.textContent = coin.name;
            currentPriceDisplay.textContent = `$${coin.market_data.current_price.usd.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            
            const change = coin.market_data.price_change_percentage_24h;
            priceChangeDisplay.textContent = `${change.toFixed(2)}% (24ч)`;
            priceChangeDisplay.style.color = change >= 0 ? '#4caf50' : '#f44336';
        }

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready(); // Сообщаем TG, что мы готовы

    let currentCoin = 'bitcoin';
    let currentDays = '1';
    let myChart = null;

    // Инициализация при загрузке страницы
    window.onload = async () => {
        await fetchTopCoins();
        await loadCoinData();
    };

    async function fetchTopCoins() {
        try {
            // Берем чуть больше монет для поиска
            const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=false');
            const coins = await response.json();
            const list = document.getElementById('coins-list');
            list.innerHTML = '';
            coins.forEach(coin => {
                const option = document.createElement('option');
                option.value = coin.id;
                option.textContent = `${coin.name} (${coin.symbol.toUpperCase()})`;
                list.appendChild(option);
            });
        } catch (e) { console.error('Ошибка списка:', e); }
    }

    async function loadCoinData() {
        try {
            // Добавляем индикатор загрузки (опционально)
            document.getElementById('coin-name').textContent = 'Загрузка...';

            const infoRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}?localization=false&market_data=true`);
            const coin = await infoRes.json();
            
            // Обновляем UI
            document.getElementById('coin-icon').src = coin.image.small;
            document.getElementById('coin-name').textContent = coin.name;
            document.getElementById('current-price').textContent = `$${coin.market_data.current_price.usd.toLocaleString('en-US')}`;
            
            const change = coin.market_data.price_change_percentage_24h;
            const changeEl = document.getElementById('price-change');
            changeEl.textContent = `${change.toFixed(2)}%`;
            changeEl.style.color = change >= 0 ? '#4caf50' : '#f44336';

            // График
            const chartRes = await fetch(`https://api.coingecko.com/api/v3/coins/${currentCoin}/market_chart?vs_currency=usd&days=${currentDays}`);
            const chartData = await chartRes.json();
            updateChart(chartData.prices);
            
        } catch (e) { 
            console.error('Ошибка данных:', e);
            document.getElementById('coin-name').textContent = 'Ошибка API';
        }
    }

    // Остальные функции (updateChart и обработка кликов) остаются такими же
    // Убедись, что в функции updateChart правильно указан ctx
</script>

</body>
</html>
