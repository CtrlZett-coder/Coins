<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Ultra</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; --accent: #007AFF; }
        body { margin: 0; padding: 15px; background: #fff; color: #000; font-family: var(--font); overflow: hidden; }
        
        /* Поиск */
        #search-box { position: relative; margin-bottom: 15px; }
        #search-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; font-size: 16px; background: #f5f5f5; transition: 0.3s; }
        #search-input:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        
        #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; display: none; margin-top: 5px; max-height: 250px; overflow-y: auto; }
        .suggest-item { padding: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .suggest-item:active { background: #f9f9f9; }
        .s-id { font-weight: 800; font-size: 15px; }
        .s-name { font-size: 12px; color: #888; margin-left: 8px; }
        
        /* Контейнер графика */
        #chart-wrapper { width: 100%; height: calc(100vh - 100px); border-radius: 16px; overflow: hidden; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск: BTC, SBER, USD, GOLD..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <div id="chart-wrapper">
        <div id="tradingview_widget"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // База активов (Symbol для TradingView)
        const assets = [
            { id: 'BTC', sym: 'BINANCE:BTCUSDT', name: 'Bitcoin', desc: 'Crypto' },
            { id: 'ETH', sym: 'BINANCE:ETHUSDT', name: 'Ethereum', desc: 'Crypto' },
            { id: 'TON', sym: 'OKX:TONUSDT', name: 'Toncoin', desc: 'Crypto' },
            { id: 'SBER', sym: 'MOEX:SBER', name: 'Сбербанк', desc: 'Акция РФ' },
            { id: 'GAZP', sym: 'MOEX:GAZP', name: 'Газпром', desc: 'Акция РФ' },
            { id: 'USD', sym: 'MOEX:USDRUB_TOM', name: 'Доллар/Рубль', desc: 'Валюта' },
            { id: 'GOLD', sym: 'OANDA:XAUUSD', name: 'Золото', desc: 'Металл' },
            { id: 'AAPL', sym: 'NASDAQ:AAPL', name: 'Apple', desc: 'Акция US' }
        ];

        let currentSymbol = "BINANCE:BTCUSDT";

        function initChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Europe/Moscow",
                "theme": "light",
                "style": "3", // Область (Area) - выглядит красиво и современно
                "locale": "ru",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_widget"
            });
        }

        // Инициализация при запуске
        initChart(currentSymbol);

        // Логика поиска
        const input = document.getElementById('search-input');
        const suggs = document.getElementById('suggestions');

        input.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase();
            suggs.innerHTML = '';
            if (!val) { suggs.style.display = 'none'; return; }

            const filtered = assets.filter(a => a.id.includes(val) || a.name.toUpperCase().includes(val));
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggest-item';
                div.innerHTML = `<div><span class="s-id">${item.id}</span><span class="s-name">${item.name}</span></div><span style="font-size:10px; color:#aaa">${item.desc}</span>`;
                div.onclick = () => {
                    initChart(item.sym);
                    suggs.style.display = 'none';
                    input.value = '';
                };
                suggs.appendChild(div);
            });
            suggs.style.display = filtered.length ? 'block' : 'none';
        });

        // Закрытие поиска при клике вне
        document.addEventListener('click', (e) => {
            if (!document.getElementById('search-box').contains(e.target)) {
                suggs.style.display = 'none';
            }
        });
    </script>
</body>
</html>
