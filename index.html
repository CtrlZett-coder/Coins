<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Pro</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; --accent: #007AFF; }
        body { margin: 0; padding: 15px; background: #fff; color: #000; font-family: var(--font); overflow: hidden; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        /* Поиск */
        #search-box { position: relative; margin-bottom: 15px; flex-shrink: 0; }
        #search-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #efefef; outline: none; font-size: 16px; background: #f9f9f9; box-sizing: border-box; transition: 0.3s; }
        #search-input:focus { background: #fff; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        
        #suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; display: none; margin-top: 8px; max-height: 250px; overflow-y: auto; border: 1px solid #eee; }
        .suggest-item { padding: 14px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .suggest-item:active { background: #f0f0f0; }
        .s-id { font-weight: 800; font-size: 16px; color: #000; }
        .s-name { font-size: 12px; color: #888; margin-left: 8px; font-weight: 500; }
        
        /* Контейнер графика */
        #chart-wrapper { flex-grow: 1; width: 100%; border-radius: 18px; overflow: hidden; border: 1px solid #eee; background: #fcfcfc; position: relative; }
        #tradingview_widget { width: 100%; height: 100%; }

        /* Анимация появления */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade { animation: fadeIn 0.5s ease-in-out; }
    </style>
</head>
<body>

    <div id="search-box">
        <input type="text" id="search-input" placeholder="Поиск: BTC, SBER, USD, GOLD..." autocomplete="off">
        <div id="suggestions"></div>
    </div>

    <div id="chart-wrapper">
        <!-- Сюда вставляется график -->
        <div id="tradingview_widget"></div>
    </div>

    <!-- Подключаем библиотеку TradingView -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // База активов (Symbol для TradingView)
        const assets = [
            { id: 'BTC', sym: 'BINANCE:BTCUSDT', name: 'Bitcoin', desc: 'Крипто' },
            { id: 'ETH', sym: 'BINANCE:ETHUSDT', name: 'Ethereum', desc: 'Крипто' },
            { id: 'TON', sym: 'OKX:TONUSDT', name: 'Toncoin', desc: 'Крипто' },
            { id: 'SBER', sym: 'MOEX:SBER', name: 'Сбербанк', desc: 'Акция РФ' },
            { id: 'GAZP', sym: 'MOEX:GAZP', name: 'Газпром', desc: 'Акция РФ' },
            { id: 'USD', sym: 'MOEX:USDRUB_TOM', name: 'Доллар/Рубль', desc: 'Валюта' },
            { id: 'EUR', sym: 'MOEX:EURRUB_TOM', name: 'Евро/Рубль', desc: 'Валюта' },
            { id: 'GOLD', sym: 'OANDA:XAUUSD', name: 'Золото', desc: 'Металл' }
        ];

        // Функция создания/обновления графика
        function loadChart(symbol) {
            // Очищаем контейнер перед созданием нового виджета (чтобы не "липло")
            document.getElementById('tradingview_widget').innerHTML = '';
            
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Europe/Moscow",
                "theme": "light",
                "style": "3", // Вид: Область (Area)
                "locale": "ru",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false, // Показывает кнопки интервалов (1m, 1h, D)
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_widget",
                "hide_side_toolbar": true,
                "allow_symbol_change": false,
                "details": false,
                "hotlist": false,
                "calendar": false,
                "show_popup_button": false
            });
        }

        // Загрузка по умолчанию
        loadChart("BINANCE:BTCUSDT");

        // Логика поиска
        const input = document.getElementById('search-input');
        const suggs = document.getElementById('suggestions');

        input.addEventListener('input', (e) => {
            const val = e.target.value.toUpperCase().trim();
            suggs.innerHTML = '';
            if (!val) { suggs.style.display = 'none'; return; }

            const filtered = assets.filter(a => a.id.includes(val) || a.name.toUpperCase().includes(val));
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggest-item';
                div.innerHTML = `
                    <div><span class="s-id">${item.id}</span><span class="s-name">${item.name}</span></div>
                    <span style="font-size:10px; color:#aaa; font-weight:700;">${item.desc}</span>
                `;
                div.onclick = () => {
                    loadChart(item.sym); // Меняем график
                    suggs.style.display = 'none';
                    input.value = '';
                    input.blur(); // Скрываем клавиатуру
                };
                suggs.appendChild(div);
            });
            suggs.style.display = filtered.length ? 'block' : 'none';
        });

        // Закрытие поиска при клике на график
        document.addEventListener('click', (e) => {
            if (!document.getElementById('search-box').contains(e.target)) {
                suggs.style.display = 'none';
            }
        });
    </script>
</body>
</html>
