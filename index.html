<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoGenius Pro</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --font: 'Inter', sans-serif;
            --ios-bg: #ffffff;
            --ios-gray: #f2f2f7;
            --ios-blue: #007AFF;
            --ios-secondary: #8e8e93;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--ios-bg); font-family: var(--font);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Двойная шапка (Два значения на видном месте) */
        #dual-header {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 0.5px solid #e5e5ea; gap: 8px; background: #fff;
        }

        .selector-box {
            flex: 1; display: flex; align-items: center;
            background: var(--ios-gray); padding: 8px 10px;
            border-radius: 12px; cursor: pointer; transition: background 0.2s;
        }
        .selector-box:active { background: #e5e5ea; }

        .sel-flag { font-size: 20px; margin-right: 8px; width: 24px; text-align: center; }
        .sel-label { flex-grow: 1; overflow: hidden; }
        .sel-code { font-weight: 800; font-size: 14px; display: block; }
        .sel-desc { font-size: 9px; color: var(--ios-secondary); text-transform: uppercase; white-space: nowrap; }
        .sel-chevron { font-size: 10px; color: var(--ios-secondary); margin-left: 4px; }

        .divider-icon { font-size: 16px; color: var(--ios-secondary); font-weight: 300; }

        /* График */
        #chart-wrapper { flex-grow: 1; position: relative; }
        #tv-chart { width: 100%; height: 100%; }

        /* Периоды */
        #footer-controls { padding: 12px 12px 24px; border-top: 0.5px solid #e5e5ea; background: #fff; }
        #periods { display: flex; background: var(--ios-gray); padding: 2px; border-radius: 10px; gap: 2px; }
        .period-btn {
            flex: 1; border: none; background: none; padding: 10px 0;
            font-size: 11px; font-weight: 700; border-radius: 8px; color: var(--ios-secondary);
        }
        .period-btn.active { background: #000; color: #fff; }

        /* МОДАЛКА СО СТОПКАМИ */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #modal-overlay.open { transform: translateY(0); }

        #modal-header { padding: 16px; border-bottom: 0.5px solid #e5e5ea; display: flex; justify-content: space-between; align-items: center; }
        #modal-title { font-weight: 800; font-size: 18px; }
        
        #modal-search { padding: 12px 16px; }
        #search-input { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--ios-gray); font-size: 16px; outline: none; }

        #tabs { display: flex; padding: 0 16px 12px; gap: 8px; }
        .tab { padding: 8px 14px; background: var(--ios-gray); border-radius: 20px; font-size: 12px; font-weight: 700; color: var(--ios-secondary); cursor: pointer; }
        .tab.active { background: var(--ios-blue); color: #fff; }

        #assets-list { overflow-y: auto; flex-grow: 1; padding-bottom: 40px; }
        .asset-item { display: flex; align-items: center; padding: 12px 16px; border-bottom: 0.5px solid #f2f2f7; }
        .asset-flag { font-size: 24px; margin-right: 14px; width: 30px; text-align: center; }
        .asset-info { display: flex; flex-direction: column; }
        .asset-name-bold { font-weight: 700; font-size: 16px; }
        .asset-name-sub { font-size: 12px; color: var(--ios-secondary); }
    </style>
</head>
<body>

    <div id="dual-header">
        <div class="selector-box" id="base-trigger" onclick="openModal('base')">
            <span class="sel-flag" id="base-flag">🇰🇿</span>
            <div class="sel-label">
                <span class="sel-code" id="base-code">KZT</span>
                <span class="sel-desc">Объект</span>
            </div>
            <span class="sel-chevron">▼</span>
        </div>

        <div class="divider-icon">/</div>

        <div class="selector-box" id="quote-trigger" onclick="openModal('quote')">
            <span class="sel-flag" id="quote-flag">🇺🇸</span>
            <div class="sel-label">
                <span class="sel-code" id="quote-code">USD</span>
                <span class="sel-desc">Валюта</span>
            </div>
            <span class="sel-chevron">▼</span>
        </div>
    </div>

    <div id="chart-wrapper"><div id="tv-chart"></div></div>

    <div id="footer-controls">
        <div id="periods">
            <button class="period-btn active" data-range="1D" data-int="5">1Д</button>
            <button class="period-btn" data-range="1W" data-int="60">1Н</button>
            <button class="period-btn" data-range="1M" data-int="240">1М</button>
            <button class="period-btn" data-range="3M" data-int="D">3М</button>
            <button class="period-btn" data-range="6M" data-int="D">6М</button>
            <button class="period-btn" data-range="12M" data-int="W">1Г</button>
            <button class="period-btn" data-range="ALL" data-int="M">Все</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div id="modal-header">
            <div id="modal-title">Выбор актива</div>
            <div style="color:var(--ios-blue); font-weight:600;" onclick="closeModal()">Готово</div>
        </div>
        <div id="modal-search"><input type="text" id="search-input" placeholder="Поиск (BTC, RUB, KZT...)"></div>
        <div id="tabs">
            <div class="tab active" data-type="val">Валюты</div>
            <div class="tab" data-type="crypto">Крипто</div>
            <div class="tab" data-type="metal">Металлы</div>
        </div>
        <div id="assets-list"></div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let base = { id: 'KZT', f: '🇰🇿', s: 'KZT', type: 'val' };
        let quote = { id: 'USD', f: '🇺🇸', s: 'USD', type: 'val' };
        let selectionMode = 'base';
        let activeTab = 'val';

        const allAssets = [
            // ВАЛЮТЫ
            { id: 'RUB', f: '🇷🇺', n: 'Российский рубль', type: 'val' },
            { id: 'USD', f: '🇺🇸', n: 'Доллар США', type: 'val' },
            { id: 'KZT', f: '🇰🇿', n: 'Казахский тенге', type: 'val' },
            { id: 'EUR', f: '🇪🇺', n: 'Евро', type: 'val' },
            { id: 'CNY', f: '🇨🇳', n: 'Китайский юань', type: 'val' },
            { id: 'TRY', f: '🇹🇷', n: 'Турецкая лира', type: 'val' },
            { id: 'BYN', f: '🇧🇾', n: 'Бел. рубль', type: 'val' },
            { id: 'AMD', f: '🇦🇲', n: 'Армянский драм', type: 'val' },
            { id: 'IRR', f: '🇮🇷', n: 'Иранский риал', type: 'val' },
            { id: 'THB', f: '🇹🇭', n: 'Тайский бат', type: 'val' },
            { id: 'AED', f: '🇦🇪', n: 'Дирхам ОАЭ', type: 'val' },
            // КРИПТО
            { id: 'BTC', f: '₿', n: 'Bitcoin', type: 'crypto' },
            { id: 'ETH', f: '💎', n: 'Ethereum', type: 'crypto' },
            { id: 'TON', f: '💎', n: 'Toncoin', type: 'crypto' },
            { id: 'SOL', f: '☀️', n: 'Solana', type: 'crypto' },
            { id: 'USDT', f: '💵', n: 'Tether', type: 'crypto' },
            // МЕТАЛЛЫ
            { id: 'GOLD', f: '📀', n: 'Золото', type: 'metal' },
            { id: 'SILVER', f: '⚪', n: 'Серебро', type: 'metal' }
        ];

        function createWidget() {
            let symbol = "";
            // Логика формирования тикера для TradingView
            if (base.type === 'crypto') {
                symbol = `BINANCE:${base.id}${quote.id === 'USD' ? 'USDT' : quote.id}`;
            } else if (base.id === 'GOLD') {
                symbol = `OANDA:XAU${quote.id}`;
            } else {
                // Пытаемся построить пару валют
                symbol = `FX_IDC:${quote.id}${base.id}`;
            }

            document.getElementById('tv-chart').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "range": "1M",
                "theme": "light",
                "style": "3",
                "locale": "ru",
                "container_id": "tv-chart",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "backgroundColor": "#ffffff"
            });
        }

        function openModal(mode) {
            selectionMode = mode;
            document.getElementById('modal-title').innerText = mode === 'base' ? 'Что измеряем?' : 'В чем измеряем?';
            document.getElementById('modal-overlay').classList.add('open');
            renderList();
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

        function renderList(search = "") {
            const list = document.getElementById('assets-list');
            list.innerHTML = '';
            const filtered = allAssets.filter(a => 
                a.type === activeTab && 
                (a.id.includes(search.toUpperCase()) || a.n.toUpperCase().includes(search.toUpperCase()))
            );

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'asset-item';
                div.innerHTML = `<span class="asset-flag">${item.f}</span>
                                 <div class="asset-info">
                                    <span class="asset-name-bold">${item.id}</span>
                                    <span class="asset-name-sub">${item.n}</span>
                                 </div>`;
                div.onclick = () => {
                    if(selectionMode === 'base') {
                        base = item;
                        document.getElementById('base-flag').innerText = item.f;
                        document.getElementById('base-code').innerText = item.id;
                    } else {
                        quote = item;
                        document.getElementById('quote-flag').innerText = item.f;
                        document.getElementById('quote-code').innerText = item.id;
                    }
                    createWidget();
                    closeModal();
                };
                list.appendChild(div);
            });
        }

        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                t.classList.add('active');
                activeTab = t.dataset.type;
                renderList();
            };
        });

        document.getElementById('search-input').oninput = (e) => renderList(e.target.value);

        // Периоды
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                createWidget(); // В реальном API здесь бы менялся range
            };
        });

        createWidget();
    </script>
</body>
</html>
