<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoGenius Ultimate</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --font: 'Inter', sans-serif;
            --ios-bg: #ffffff;
            --ios-gray: #f2f2f7;
            --ios-text: #000000;
            --ios-secondary: #8e8e93;
            --ios-blue: #007AFF;
        }

        body {
            margin: 0; padding: 0; height: 100vh;
            background: var(--ios-bg); font-family: var(--font);
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Шапка с выбором валюты */
        #header-selector {
            padding: 16px;
            display: flex; align-items: center;
            border-bottom: 0.5px solid #e5e5ea;
            cursor: pointer;
            transition: background 0.2s;
        }
        #header-selector:active { background: #f2f2f7; }

        #current-flag { font-size: 32px; margin-right: 12px; }
        #current-info { flex-grow: 1; }
        #current-name { font-size: 22px; font-weight: 700; }
        #current-sub { font-size: 14px; color: var(--ios-secondary); }
        .chevron { color: var(--ios-secondary); font-size: 20px; }

        /* График */
        #chart-wrapper { flex-grow: 1; position: relative; }
        #tv-chart { width: 100%; height: 100%; }

        /* Кнопки периодов */
        #footer-controls { padding: 12px 16px 24px; border-top: 0.5px solid #e5e5ea; }
        #periods {
            display: flex; background: var(--ios-gray);
            padding: 2px; border-radius: 10px;
        }
        .period-btn {
            flex: 1; border: none; background: none; padding: 8px 0;
            font-size: 13px; font-weight: 600; border-radius: 8px;
        }
        .period-btn.active { background: #000; color: #fff; }

        /* МОДАЛЬНОЕ ОКНО ВЫБОРА (Full Screen) */
        #modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 9999;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column;
        }
        #modal-overlay.open { transform: translateY(0); }

        #modal-header {
            padding: 16px; border-bottom: 0.5px solid #e5e5ea;
            display: flex; justify-content: space-between; align-items: center;
        }
        #modal-title { font-weight: 700; font-size: 18px; }
        #close-modal { color: var(--ios-blue); font-weight: 600; cursor: pointer; }

        #modal-search { padding: 10px 16px; }
        #search-input {
            width: 100%; padding: 10px 12px; border-radius: 10px;
            border: none; background: var(--ios-gray); font-size: 16px; outline: none;
        }

        #tabs { display: flex; padding: 0 16px 10px; gap: 8px; }
        .tab {
            padding: 6px 16px; background: var(--ios-gray); border-radius: 20px;
            font-size: 13px; font-weight: 600; color: var(--ios-secondary);
        }
        .tab.active { background: var(--ios-blue); color: #fff; }

        #assets-list { overflow-y: auto; flex-grow: 1; }
        .asset-item {
            display: flex; align-items: center; padding: 12px 16px;
            border-bottom: 0.5px solid #f2f2f7;
        }
        .asset-item:active { background: #f2f2f7; }
        .asset-flag { font-size: 24px; margin-right: 15px; width: 30px; text-align: center; }
        .asset-code { font-weight: 700; font-size: 16px; }
        .asset-full-name { font-size: 13px; color: var(--ios-secondary); display: block; }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <div id="header-selector">
        <div id="current-flag">🇺🇸</div>
        <div id="current-info">
            <div id="current-name">USD <span style="color:#8e8e93; font-weight:400;">/ RUB</span></div>
            <div id="current-sub">Доллар США</div>
        </div>
        <div class="chevron">▼</div>
    </div>

    <div id="chart-wrapper">
        <div id="tv-chart"></div>
    </div>

    <div id="footer-controls">
        <div id="periods">
            <button class="period-btn active" data-range="1D" data-int="5">1Д</button>
            <button class="period-btn" data-range="1W" data-int="60">1Н</button>
            <button class="period-btn" data-range="1M" data-int="240">1М</button>
            <button class="period-btn" data-range="12M" data-int="W">1Г</button>
            <button class="period-btn" data-range="ALL" data-int="M">Все</button>
        </div>
    </div>

    <!-- Модалка выбора валюты -->
    <div id="modal-overlay">
        <div id="modal-header">
            <div id="modal-title">Выберите валюту</div>
            <div id="close-modal">Готово</div>
        </div>
        <div id="modal-search">
            <input type="text" id="search-input" placeholder="Поиск страны или кода...">
        </div>
        <div id="tabs">
            <div class="tab active">Валюты</div>
            <div class="tab">Крипто</div>
            <div class="tab">Металлы</div>
        </div>
        <div id="assets-list">
            <!-- Список генерируется JS -->
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentSymbol = "FX_IDC:USDRUB";
        let currentRange = "1D";
        let currentInterval = "5";

        // Расширенная база (Все страны)
        const allAssets = [
            { id: 'USD', f: '🇺🇸', n: 'Доллар США', s: 'FX_IDC:USDRUB', type: 'val' },
            { id: 'EUR', f: '🇪🇺', n: 'Евро', s: 'FX_IDC:EURRUB', type: 'val' },
            { id: 'KZT', f: '🇰🇿', n: 'Тенге (Казахстан)', s: 'FX_IDC:USDKZT', type: 'val' },
            { id: 'IRR', f: '🇮🇷', n: 'Иранский риал', s: 'FX_IDC:USDIRR', type: 'val' },
            { id: 'AFN', f: '🇦🇫', n: 'Афгани', s: 'FX_IDC:USDAFN', type: 'val' },
            { id: 'AMD', f: '🇦🇲', n: 'Армянский драм', s: 'FX_IDC:USDAMD', type: 'val' },
            { id: 'TRY', f: '🇹🇷', n: 'Турецкая лира', s: 'FX_IDC:USDTRY', type: 'val' },
            { id: 'AED', f: '🇦🇪', n: 'Дирхам (ОАЭ)', s: 'FX_IDC:USDAED', type: 'val' },
            { id: 'CNY', f: '🇨🇳', n: 'Китайский юань', s: 'FX_IDC:CNYRUB', type: 'val' },
            { id: 'SBER', f: '🇷🇺', n: 'Сбербанк (MOEX)', s: 'MOEX:SBER', type: 'val' },
            { id: 'BTC', f: '₿', n: 'Bitcoin', s: 'BINANCE:BTCUSDT', type: 'crypto' },
            { id: 'ETH', f: '💎', n: 'Ethereum', s: 'BINANCE:ETHUSDT', type: 'crypto' },
            { id: 'TON', f: '💎', n: 'Toncoin', s: 'OKX:TONUSDT', type: 'crypto' },
            { id: 'GOLD', f: '📀', n: 'Золото', s: 'OANDA:XAUUSD', type: 'metal' },
            { id: 'SILV', f: '⚪', n: 'Серебро', s: 'OANDA:XAGUSD', type: 'metal' }
        ];

        function createWidget() {
            document.getElementById('tv-chart').innerHTML = '';
            new TradingView.widget({
                "autosize": true,
                "symbol": currentSymbol,
                "interval": currentInterval,
                "range": currentRange,
                "theme": "light",
                "style": "3",
                "locale": "ru",
                "container_id": "tv-chart",
                "hide_top_toolbar": true,
                "hide_legend": true,
                "hide_side_toolbar": true,
                "backgroundColor": "#ffffff"
            });
        }

        createWidget();

        // Управление модалкой
        const header = document.getElementById('header-selector');
        const modal = document.getElementById('modal-overlay');
        const closeBtn = document.getElementById('close-modal');
        const listContainer = document.getElementById('assets-list');

        header.onclick = () => { modal.classList.add('open'); renderList(allAssets); };
        closeBtn.onclick = () => modal.classList.remove('open');

        function renderList(data) {
            listContainer.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'asset-item';
                div.innerHTML = `
                    <div class="asset-flag">${item.f}</div>
                    <div class="asset-info">
                        <span class="asset-code">${item.id}</span>
                        <span class="asset-full-name">${item.n}</span>
                    </div>
                `;
                div.onclick = () => {
                    currentSymbol = item.s;
                    document.getElementById('current-flag').textContent = item.f;
                    document.getElementById('current-name').innerHTML = `${item.id} <span style="color:#8e8e93; font-weight:400;">/ ${item.s.includes('RUB') ? 'RUB' : (item.s.includes('USD') ? 'USD' : 'USDT')}</span>`;
                    document.getElementById('current-sub').textContent = item.n;
                    createWidget();
                    modal.classList.remove('open');
                };
                listContainer.appendChild(div);
            });
        }

        // Поиск в модалке
        document.getElementById('search-input').oninput = function() {
            const val = this.value.toUpperCase();
            const filtered = allAssets.filter(a => a.id.includes(val) || a.n.toUpperCase().includes(val));
            renderList(filtered);
        };

        // Кнопки периодов
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.onclick = function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentRange = this.dataset.range;
                currentInterval = this.dataset.int;
                createWidget();
            };
        });
    </script>
</body>
</html>
