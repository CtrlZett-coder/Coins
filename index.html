<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoPulse Pro (Binance)</title>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --font: 'Inter', sans-serif; }
        body { margin: 0; padding: 20px; background: #fff; color: #000; font-family: var(--font); -webkit-font-smoothing: antialiased; }
        #search-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #efefef; margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #coin-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        #price-container { margin-bottom: 20px; }
        #current-price { font-size: 36px; font-weight: 900; display: block; letter-spacing: -1px; }
        #price-change { font-size: 14px; font-weight: 700; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 5px; }
        #chart-container { width: 100%; height: 250px; margin-bottom: 25px; }
        #periods { display: flex; justify-content: space-between; background: #f0f0f0; padding: 4px; border-radius: 12px; margin-bottom: 25px; }
        .period-btn { background: none; border: none; color: #666; padding: 10px; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; flex: 1; transition: 0.2s; }
        .period-btn.active { background: #000; color: #fff; }
        #stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: #f9f9f9; padding: 15px; border-radius: 16px; border: 1px solid #f0f0f0; }
        .stat-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
        .stat-value { font-size: 16px; font-weight: 700; }
    </style>
</head>
<body>

    <input type="text" id="search-input" placeholder="Введите тикер (например, ETH или SOL)">

    <div id="header">
        <span id="coin-name">BTC / USDT</span>
    </div>
    
    <div id="price-container">
        <span id="current-price">0.00</span>
        <span id="price-change">0.00%</span>
    </div>

    <div id="chart-container">
        <canvas id="mainChart"></canvas>
    </div>

    <div id="periods">
        <button class="period-btn active" data-interval="1h" data-limit="24">1D</button>
        <button class="period-btn" data-interval="4h" data-limit="42">1W</button>
        <button class="period-btn" data-interval="1d" data-limit="30">1M</button>
        <button class="period-btn" data-interval="1d" data-limit="90">3M</button>
        <button class="period-btn" data-interval="1w" data-limit="52">1Y</button>
    </div>

    <div id="stats">
        <div class="stat-card">
            <div class="stat-label">Максимум</div>
            <div class="stat-value" id="peak-price">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Минимум</div>
            <div class="stat-value" id="low-price">0.00</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let symbol = 'BTCUSDT';
        let interval = '1h';
        let limit = '24';
        let myChart = null;

        async function fetchData() {
            try {
                // Получаем текущую цену и 24ч изменение
                const tickerRes = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
                const ticker = await tickerRes.json();
                
                document.getElementById('coin-name').textContent = symbol.replace('USDT', ' / USDT');
                document.getElementById('current-price').textContent = parseFloat(ticker.lastPrice).toLocaleString(undefined, {minimumFractionDigits: 2});
                
                const change = parseFloat(ticker.priceChangePercent);
                const changeEl = document.getElementById('price-change');
                changeEl.textContent = (change > 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.style.background = change >= 0 ? '#e8f5e9' : '#ffebee';
                changeEl.style.color = change >= 0 ? '#2e7d32' : '#c62828';

                // Получаем данные для графика (Klines)
                const chartRes = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
                const klines = await chartRes.json();
                renderChart(klines);
            } catch (err) {
                console.error("Ошибка Binance API:", err);
            }
        }

        function renderChart(klines) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            
            // Binance klines: [0]время открытия, [4]цена закрытия, [2]максимум, [3]минимум
            const labels = klines.map(k => new Date(k[0]));
            const prices = klines.map(k => parseFloat(k[4]));
            const highs = klines.map(k => parseFloat(k[2]));
            const lows = klines.map(k => parseFloat(k[3]));

            document.getElementById('peak-price').textContent = Math.max(...highs).toLocaleString();
            document.getElementById('low-price').textContent = Math.min(...lows).toLocaleString();

            if (myChart) myChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, 'rgba(0,0,0,0.06)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: prices,
                        borderColor: '#000',
                        borderWidth: 2.5,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: false, tooltip: { intersect: false, mode: 'index' } },
                    scales: {
                        x: { display: false },
                        y: { position: 'right', grid: { color: '#f0f0f0' }, ticks: { font: { size: 10, weight: 'bold' } } }
                    }
                }
            });
        }

        // Поиск
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                let input = e.target.value.toUpperCase().trim();
                if (input) {
                    // Если ввели просто BTC, превращаем в BTCUSDT
                    symbol = input.includes('USDT') ? input : input + 'USDT';
                    fetchData();
                    e.target.blur();
                }
            }
        });

        // Периоды
        document.getElementById('periods').addEventListener('click', (e) => {
            if (e.target.classList.contains('period-btn')) {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                interval = e.target.dataset.interval;
                limit = e.target.dataset.limit;
                fetchData();
            }
        });

        window.onload = fetchData;
        // Обновление цены каждые 5 секунд
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
